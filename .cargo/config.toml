# Per-target CFLAGS (cc-rs convention): macOS host builds get the Xcode SDK
# path injected; Linux cross-compile builds see no matching var and ignore this.
#
# DEBUGGING HEURISTIC (from discussion 020, root cause of plan 008 Step 3's
# 2-day "-isysroot" investigation): if you hit an unexplained `-isysroot`
# or other env flag appearing in cc invocations during a Cargo build,
# GREP `.cargo/config.toml` `[env]` FIRST. Cargo [env] injects into every
# build-script subprocess, bypassing shell unsets and evading `env | sort`
# debug steps. This file previously had an UNSCOPED `CFLAGS` entry that
# blocked CI expansion for two weeks. See
# docs/discussions/020-ci-runner-env-cleanup/conclusion.md.
[env]
CFLAGS_x86_64_apple_darwin = "-isysroot /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
CFLAGS_aarch64_apple_darwin = "-isysroot /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
