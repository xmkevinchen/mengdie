# .claude/pipeline.yml — Agentic Engineering project config
# Generated by /ae:setup (inline from /ae:plan)

# --- Test & Lint ---
test:
  command: "cargo test"
  framework: "cargo"

lint:
  command: "cargo clippy"

# --- Output Directories ---
output:
  discussions: "docs/discussions/"
  plans: "docs/plans/"
  milestones: "docs/milestones/"
  backlog: "docs/backlog/"
  reviews: "docs/reviews/"
  analyses: "docs/analyses/"

# --- Test Plugin ---
test_plugin:
  judge: codex

# --- Work Execution ---
work:
  max_fix_loops: 3
  auto_pass: true
  review_mode: full
  security_patterns:
    - "auth/*"
    - "security/*"
    - "*.env"
    - "*secret*"
    - "*credential*"
    - "*.pem"
    - "*.key"
    - "migrations/*"

# --- Cross-Family Review ---
cross_family:
  codex: true
  gemini: true

