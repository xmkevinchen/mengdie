name: CI

# Fires on push (all branches) and pull_request. Tag-release path is
# handled by release.yml.
on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Format check
        run: |
          source ~/.cargo/env
          cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clippy
        run: |
          source ~/.cargo/env
          cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: |
          source ~/.cargo/env
          cargo test

  # Mechanical regression guard for discussion 020's `.cargo/config.toml`
  # `[env]` scoping discipline. `cargo check` is compile-phase only (no
  # link), so the Mac mini host-mode runner exercises the ring/cc-rs path
  # without needing a Linux linker. If a future change reintroduces an
  # unscoped CFLAGS/CPPFLAGS/SDKROOT in `.cargo/config.toml`, this job
  # fails at the ring cc step exactly as plan 008 Step 3's failures did —
  # catching the leak automatically. See
  # docs/discussions/020-ci-runner-env-cleanup/conclusion.md.
  cross-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cross-check (Linux target compile only)
        run: |
          source ~/.cargo/env
          cargo check --target x86_64-unknown-linux-gnu
