name: CI

# Fires on every push (all branches — tag refs inherently excluded because
# `branches:` filters branch refs only) and on pull_request events. The
# tag-release path is handled by release.yml, not here.
on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # TEMPORARY DEBUG — already confirmed env is clean; now trying
      # explicit CARGO_BUILD_TARGET to force cc-rs target detection.
      - name: DEBUG dump env + shell chain
        run: |
          echo "::group::rustc target probe"
          source ~/.cargo/env
          rustc --version --verbose
          echo "::endgroup::"
          echo "::group::full env (sorted)"
          env | sort
          echo "::endgroup::"
          echo "::group::build-flags env specifically"
          env | grep -iE "CFLAGS|CXXFLAGS|CPPFLAGS|LDFLAGS|SDKROOT|ISYSROOT|MACOSX_DEPLOYMENT|CC=|CXX=|AR=" || echo "(none — flags unset in runner env)"
          echo "::endgroup::"
          echo "::group::shell detection"
          echo "SHELL=$SHELL"
          echo "0=$0"
          echo "BASH_VERSION=$BASH_VERSION"
          echo "ZSH_VERSION=$ZSH_VERSION"
          echo "::endgroup::"
          echo "::group::parent process chain"
          pid=$$
          depth=0
          while [ -n "$pid" ] && [ $depth -lt 8 ]; do
            line=$(ps -o pid=,ppid=,comm=,args= -p "$pid" 2>/dev/null)
            [ -z "$line" ] && break
            echo "$line"
            pid=$(ps -o ppid= -p "$pid" 2>/dev/null | tr -d ' ')
            depth=$((depth + 1))
          done
          echo "::endgroup::"
          echo "::group::possible sources"
          for f in /etc/environment /etc/zsh/zshenv /etc/profile /etc/bash.bashrc ~/.zshenv ~/.zshrc ~/.bashrc ~/.profile; do
            if [ -f "$f" ] && grep -qE "CFLAGS|SDKROOT|isysroot" "$f" 2>/dev/null; then
              echo "== $f =="
              grep -nE "CFLAGS|SDKROOT|isysroot" "$f" 2>/dev/null
            fi
          done
          echo "::endgroup::"

      - uses: actions/checkout@v4

      # NOTE: `actions/cache@v4` was intended here but the Forgejo Actions
      # marketplace mirror (code.forgejo.org) gave "connection reset by peer"
      # during the action clone on the first CI run. Dropped per plan 008
      # rollback option 2 — rely on the self-hosted runner's persistent
      # $HOME/.cargo and $HOME/.cache/fastembed between runs. Revisit if:
      # (a) CI wall time exceeds 8 min warm, OR
      # (b) a working Forgejo cache backend is deployed.

      - name: Ensure rustfmt + clippy components
        # Idempotent component install — we don't pin a toolchain version
        # (no rust-toolchain.toml) but we DO need these two components to
        # be present on the runner. rustup noops if they're already there.
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          unset SDKROOT CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
          source ~/.cargo/env
          rustup component add rustfmt clippy

      - name: Toolchain version log
        # Sanity log only — not a guard. Helps debug CI-vs-local mismatches.
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          unset SDKROOT CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
          source ~/.cargo/env
          rustc --version
          cargo fmt --version
          cargo clippy --version

      - name: Format check
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          unset SDKROOT CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
          source ~/.cargo/env
          cargo fmt --all -- --check

      - name: Clippy
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          unset SDKROOT CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
          source ~/.cargo/env
          cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          unset SDKROOT CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
          source ~/.cargo/env
          cargo test
