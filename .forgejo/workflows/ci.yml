name: CI

# Fires on push (all branches) and pull_request. Tag-release path is
# handled by release.yml.
on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Format check
        run: |
          source ~/.cargo/env
          cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clippy
        run: |
          source ~/.cargo/env
          cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: |
          source ~/.cargo/env
          cargo test

  # Cross-target compile check. `cargo check` with `--target` is
  # compile-phase only (no link), so this runs without a Linux linker.
  #
  # Value on the CURRENT runner (ckai-macmini.local, Linux x86_64):
  # because host == target, this is essentially equivalent to plain
  # `cargo check`. No extra regression guard today.
  #
  # Value if the runner EVER moves to macOS host: this job catches any
  # reintroduction of an unscoped `[env] CFLAGS` in `.cargo/config.toml`
  # (the discussion-020 root cause class) because the Linux target would
  # receive the macOS-flavored flag. On macOS host it's a real guard;
  # on Linux host it's redundant-but-cheap. Keeping it so the guard is
  # already in place if the runner topology shifts. See
  # docs/discussions/020-ci-runner-env-cleanup/conclusion.md.
  cross-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cross-check (Linux target compile only)
        run: |
          source ~/.cargo/env
          cargo check --target x86_64-unknown-linux-gnu
